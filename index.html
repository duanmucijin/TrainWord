<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RailWords</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="bg-glow"></div>

<header class="top">
  <img class="logo" src="assets/logo.png" alt="logo" />
  <button class="ghost-btn">Download</button>
</header>

<main class="hero">

  <img class="core" src="assets/iconcenter.png" alt="train-core">

  <h1>
    每一个单词<br/>
    都是一段轨道
  </h1>

  <p>
    点击开始，让火车继续前进
  </p>

  <div class="actions">
    <button class="primary-btn">开始体验</button>
    <button class="secondary-btn" id="demoBtn">查看演示</button>
  </div>

</main>

<div class="track-line"></div>

<script src="app.js"></script>
</body>
</html>
